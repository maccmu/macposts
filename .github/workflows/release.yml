name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  sdist:
    name: Release source distribution
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
        submodules: true
        persist-credentials: false

    - name: Build sdist
      run: pipx run build --sdist

    - uses: actions/upload-artifact@v4
      with:
        name: artifact-sdist
        path: dist/*.tar.gz

  wheels:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    name: Release wheels on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
        submodules: true
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - uses: pypa/cibuildwheel@v2.22.0
      env:
        CIBW_ARCHS: auto64
        CIBW_ARCHS_MACOS: "auto64 universal2"
        # We do not support PyPy (for now).
        CIBW_SKIP: "pp*"

        # pip >= 25 drops support for Python 3.8, may need to change other files as well
        CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"

        # Disable OpenSSL for Linux (manylinux) to avoid source build failure
        CIBW_ENVIRONMENT_LINUX: CMAKE_ARGS="-DCMAKE_USE_OPENSSL=OFF"

        # musllinux (Alpine) has no pre-built cmake pip wheel; install from apk once
        CIBW_BEFORE_ALL_LINUX: |
          if command -v apk &>/dev/null; then
            apk add cmake ninja
          fi

        CIBW_BEFORE_BUILD: |
          python -m pip install --upgrade pip
          cmake --version 2>/dev/null || python -m pip install "cmake>=3.10"
          python -m pip install ninja "setuptools>=64" "setuptools_scm>=8" wheel
          cmake --version

        # Linux only: --no-build-isolation reuses cmake from apk/pip (above)
        # so the isolated env never tries to build cmake from source on musllinux.
        # Windows/macOS have pre-built cmake wheels and don't need this.
        CIBW_BUILD_FRONTEND_LINUX: "pip; args: --no-build-isolation"
        CIBW_BUILD_VERBOSITY: 1

    - uses: actions/upload-artifact@v4
      with:
        name: artifact-wheel-${{ matrix.platform }}
        path: wheelhouse/*.whl

  upload:
    needs: [sdist, wheels]
    if: startsWith(github.ref, 'refs/tags/')
    name: Upload artifacts to assets
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    - uses: actions/download-artifact@v4
      with:
        pattern: artifact-*
        path: dist
        merge-multiple: true

    - name: Create checksums
      run: sha256sum * > SHA256SUMS
      working-directory: dist

    - name: Extract release note
      run: |
        awk -v v='${{ github.ref_name }}' \
          '/^## v[0-9]/{if($2==v){p=1;next}else{p=0}};p' \
          CHANGELOG.md > relnote

    - uses: softprops/action-gh-release@v1
      with:
        body_path: relnote
        files: dist/*